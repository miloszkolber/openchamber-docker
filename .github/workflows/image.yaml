name: Build image

on:
    push:
        branches: [main]
        paths:
            - Dockerfile
            - versions.env
            - patches/**
            - .github/workflows/image.yaml
    schedule:
        - cron: "17 */6 * * *"
    workflow_dispatch:
        inputs:
            check_upstream:
                description: Resolve current stable upstream releases
                type: boolean
                default: true

permissions:
    contents: write
    packages: write

concurrency:
    group: image-${{ github.ref }}
    cancel-in-progress: false

jobs:
    image:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Resolve upstream versions
              id: upstream
              if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.check_upstream)
              run: node scripts/update-versions.mjs

            - name: Load versions
              id: versions
              run: |
                  cat versions.env >> "$GITHUB_ENV"
                  cat versions.env >> "$GITHUB_OUTPUT"

            - name: Decide whether to build
              id: decision
              env:
                  UPSTREAM_CHANGED: ${{ steps.upstream.outputs.changed }}
              run: |
                  if [[ "${{ github.event_name }}" == schedule && "$UPSTREAM_CHANGED" != true ]]; then
                      echo 'build=false' >> "$GITHUB_OUTPUT"
                  else
                      echo 'build=true' >> "$GITHUB_OUTPUT"
                  fi

            - uses: docker/setup-buildx-action@v4
              if: steps.decision.outputs.build == 'true'

            - name: Log in to GHCR
              if: steps.decision.outputs.build == 'true'
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and publish
              if: steps.decision.outputs.build == 'true'
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/openchamber-docker:latest
                      ghcr.io/${{ github.repository_owner }}/openchamber-docker:${{ env.OPENCHAMBER_VERSION }}_${{ env.OPENCODE_VERSION }}
                  build-args: |
                      OPENCHAMBER_VERSION=${{ env.OPENCHAMBER_VERSION }}
                      OPENCHAMBER_PACKAGE_SHA256=${{ env.OPENCHAMBER_PACKAGE_SHA256 }}
                      OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}
                      OPENCODE_AMD64_SHA256=${{ env.OPENCODE_AMD64_SHA256 }}
                      VCS_REF=${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: mode=max
                  sbom: true

            - name: Remove superseded package versions
              if: steps.decision.outputs.build == 'true'
              env:
                  CURRENT_TAG: ${{ env.OPENCHAMBER_VERSION }}_${{ env.OPENCODE_VERSION }}
                  GH_OWNER: ${{ github.repository_owner }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh api --paginate --slurp \
                      "/users/$GH_OWNER/packages/container/openchamber-docker/versions?per_page=100" \
                      > /tmp/package-versions.json

                  while read -r version_id; do
                      [[ -n "$version_id" ]] || continue
                      gh api --method DELETE \
                          "/users/$GH_OWNER/packages/container/openchamber-docker/versions/$version_id"
                  done < <(
                      jq -r --arg current "$CURRENT_TAG" \
                          '[.[][]] as $versions |
                           ($versions | map(select((.metadata.container.tags // []) | index($current))) |
                            first | .created_at | fromdateiso8601) as $current_time |
                           $versions[] |
                           select((.created_at | fromdateiso8601) < ($current_time - 600)) |
                           .id' \
                          /tmp/package-versions.json
                  )

            - name: Record successful upstream update
              if: steps.decision.outputs.build == 'true' && steps.upstream.outputs.changed == 'true'
              run: |
                  git config user.name github-actions[bot]
                  git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                  git add versions.env
                  git commit -m "chore: update upstream versions"
                  git push
