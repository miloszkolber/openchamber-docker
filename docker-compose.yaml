services:
    openchamber:
        image: ghcr.io/miloszkolber/openchamber-docker:latest
        container_name: openchamber
        restart: unless-stopped
        network_mode: host
        user: "1000:1000"
        group_add:
            - "${DOCKER_GID:-109}"
        privileged: true
        pid: host
        env_file:
            - path: .env
              required: false
        read_only: true
        tmpfs:
            - /tmp:exec,size=512M,mode=1777
            - /run:size=64M,mode=755
        volumes:
            - ${DATA_PATH:-./data}:/home/data
            - /var/run/docker.sock:/var/run/docker.sock:ro
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${OPENCHAMBER_PORT:-4098}/health\""]
            interval: 60s
            timeout: 5s
            retries: 3
            start_period: 10s
